<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Game - Results</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="results-card">
            <h1 class="title">🏆 Game Over!</h1>
            <p class="subtitle">Final Scores</p>

            <div class="podium" id="podium">
                <!-- Podium will be populated dynamically -->
            </div>

            <div class="scoreboard-final" id="finalScoreboard">
                <!-- Final scores will be populated dynamically -->
            </div>

            <div class="results-actions">
                <button id="playAgainBtn" class="btn btn-primary">
                    🔄 Play Again
                </button>
                <button id="newGameBtn" class="btn btn-secondary">
                    🆕 New Game Setup
                </button>
            </div>
        </div>
    </div>

    <script src="results.js"></script>
</body>
</html>
